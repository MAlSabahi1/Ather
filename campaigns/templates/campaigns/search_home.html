{% extends 'campaigns/base.html' %}

{% block title %}بحث أثر | Athar{% endblock %}

{% block content %}
<div class="py-16 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto w-full min-h-[75vh] flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Background Accents -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full pointer-events-none z-0">
        <div class="absolute top-20 left-10 w-64 h-64 bg-brand-500/5 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-20 right-10 w-64 h-64 bg-indigo-500/5 rounded-full blur-[100px]"></div>
    </div>

    <div class="relative z-10 w-full flex flex-col items-center space-y-12">
        <!-- Brand Header -->
        <div class="text-center space-y-6 max-w-2xl">
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter leading-tight">
                استكشف <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-indigo-600">الأثر الرقمي</span> <br>بمنهجية علمية
            </h1>
            <p class="text-slate-500 text-lg font-medium leading-relaxed opacity-80">
                أدخل اسم الحملة المستهدفة ليقوم نظام الذكاء الاصطناعي بتحليل البيانات وربطها بالنظريات الإعلامية فوراً.
            </p>
        </div>

        {% if error %}
        <div class="p-5 bg-red-50 text-red-700 rounded-2xl border border-red-100 text-sm font-bold animate-shake">
            {{ error }}
        </div>
        {% endif %}

        <!-- Compact Search Console -->
        <div class="w-full max-w-3xl relative group">
            <form action="{% url 'campaigns:scanner' %}" method="get" class="relative bg-white rounded-2xl shadow-2xl flex flex-col lg:flex-row items-center p-1.5 gap-1.5 border border-slate-100">
                
                <div class="relative flex-grow w-full">
                    <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none text-slate-400">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input type="text" name="q" required autocomplete="off"
                           class="block w-full pr-12 pl-6 py-4 bg-transparent border-none text-base font-bold text-slate-900 placeholder-slate-300 transition-all outline-none"
                           placeholder="اسم الحملة الرقمية...">
                </div>

                <div class="flex flex-col sm:flex-row items-center gap-1.5 w-full lg:w-auto">
                    <select name="platform" class="w-full lg:w-36 py-4 px-5 bg-slate-50 border-none rounded-xl text-[11px] font-black text-slate-600 appearance-none cursor-pointer outline-none focus:bg-slate-100 transition-all">
                        <option value="X">X (Twitter)</option>
                        <option value="TikTok">TikTok</option>
                        <option value="Snapchat">Snapchat</option>
                        <option value="Instagram">Instagram</option>
                    </select>
                    
                    <button type="submit" class="w-full sm:w-auto px-8 py-4 bg-slate-950 text-white rounded-xl font-black text-xs hover:bg-brand-600 transition-all active:scale-95 whitespace-nowrap">
                        بحث الآن
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.4s ease-in-out; }
</style>
{% endblock %}
