{% extends 'campaigns/base.html' %}

{% block title %}جاري المسح الرقمي... | أثر - Athar{% endblock %}

{% block content %}
<div class="min-h-[75vh] flex flex-col items-center justify-center p-8 bg-slate-50 overflow-hidden relative">
    <!-- Subtle Grid Accent -->
    <div class="absolute inset-0 z-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#000 1px, transparent 0); background-size: 40px 40px;"></div>
    
    <div class="relative z-10 w-full max-w-2xl flex flex-col items-center space-y-12">
        
        <!-- Refined Scanner Core -->
        <div class="relative w-48 h-48 flex items-center justify-center">
            <!-- Outer Orbit -->
            <div class="absolute inset-0 border border-slate-200 rounded-full"></div>
            <div class="absolute inset-0 border-t-2 border-brand-500 rounded-full animate-spin"></div>
            
            <!-- Inner Core -->
            <div class="w-32 h-32 bg-white rounded-full border border-slate-100 flex items-center justify-center shadow-2xl relative">
                <div class="absolute inset-2 bg-brand-50 rounded-full animate-pulse opacity-50"></div>
                <svg class="w-10 h-10 text-brand-600 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>

        <!-- Status & Progress -->
        <div class="text-center space-y-4 w-full">
            <h2 class="text-3xl font-black text-slate-950 tracking-tighter">تحليل الفضاء الرقمي لـ "<span class="text-brand-600">{{ query }}</span>"</h2>
            <p id="status-message" class="text-slate-400 font-bold text-xs tracking-[0.3em] uppercase">جاري تهيئة الاتصال...</p>
            
            <div class="max-w-sm mx-auto pt-6">
                <div class="w-full h-1 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-brand-600 w-0 transition-all duration-700 ease-out"></div>
                </div>
                <div class="flex justify-center mt-3">
                    <span id="progress-text" class="text-[10px] font-black text-brand-600 tracking-widest">0%</span>
                </div>
            </div>
        </div>

        <!-- System Logs (Ultra-Minimalist) -->
        <div class="w-full max-w-md bg-white border border-slate-100 rounded-2xl p-6 shadow-sm overflow-hidden h-32 relative">
            <div id="logs" class="space-y-2 font-bold text-[10px] text-slate-400">
                <div class="flex gap-3"><span class="text-brand-500 opacity-50">•</span> <span>بدء رصد البيانات الاستراتيجية...</span></div>
            </div>
            <div class="absolute bottom-0 left-0 w-full h-8 bg-gradient-to-t from-white to-transparent pointer-events-none"></div>
        </div>
    </div>
</div>

<script>
    const messages = [
        "رصد التفاعلات الرقمية...",
        "تحليل السلوك الجماهيري...",
        "مطابقة النظريات الإعلامية...",
        "إعداد التقرير النهائي..."
    ];

    const logs = [
        "تم استخراج مؤشرات التفاعل...",
        "رسم خارطة المشاعر الإقليمية...",
        "تطبيق نموذج ترتيب الأولويات...",
        "توليد التقييم العلمي النهائي..."
    ];

    let current = 0;
    const msgEl = document.getElementById('status-message');
    const progEl = document.getElementById('progress-bar');
    const progTextEl = document.getElementById('progress-text');
    const logEl = document.getElementById('logs');

    const interval = setInterval(() => {
        if (current < messages.length) {
            msgEl.innerText = messages[current];
            const progress = (current + 1) * 25;
            progEl.style.width = `${progress}%`;
            progTextEl.innerText = `${progress}%`;
            
            const logEntry = document.createElement('div');
            logEntry.className = "flex gap-3 animate-fade-in";
            logEntry.innerHTML = `<span class="text-brand-500">•</span> <span>${logs[current]}</span>`;
            logEl.appendChild(logEntry);
            
            current++;
        } else {
            clearInterval(interval);
            setTimeout(() => {
                window.location.href = "{% url 'campaigns:search_results' %}?q={{ query|urlencode }}&platform={{ platform|urlencode }}";
            }, 800);
        }
    }, 1500);
</script>

<style>
    @keyframes fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
</style>
{% endblock %}
